site_name: NOMAD Gallery
site_description: A mkdocs-based GitHub Pages site for showcasing NOMAD features, examples, and use cases.
site_author: Berfin Güne, Haoyu Yang, Joseph Rudzinski, Ahmed E. Mansour

repo_url: https://github.com/FAIRmat-NFDI/nomad-gallery
edit_uri: ""

nav:
  - Explore: index.md
  - Submit: submissions.md
plugins:
  - search
  - macros
theme:
  name: material
  palette:
    primary: "#2A4CDF"
    accent: "#008A67"
  font:
    text: "Titillium Web"
  favicon: assets/favicon.png
  features:
    - content.tabs.link
  custom_dir: docs/theme
  icon:
    repo: fontawesome/brands/github
markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: True
  - pymdownx.arithmatex:
      generic: true
  - mkdocs-click
  - pymdownx.extra
extra:
  generator: false
  homepage: https://nomad-lab.eu
use_directory_urls: false
extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascript.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
