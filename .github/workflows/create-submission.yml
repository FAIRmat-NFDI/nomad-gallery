name: Process Approved Submission to Create Cards
on:
  issues:
    types: [labeled]

jobs:
  create-card:
    if: github.event.label.name == 'submission-approved'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # issues: write # Needed to comment on the issue later
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Parse Issue
        uses: stefanbuck/github-issue-parser@v3
        id: issue-parser
        with:
          template-path: .github/ISSUE_TEMPLATE/submission.yml

      - name: Extract and Download Image
        env:
          IMAGE_MD: ${{ steps.issue-parser.outputs.issueparser_image_url }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          # The regex stops at spaces, parentheses, quotes, or angle brackets
          IMAGE_URL=$(echo "$IMAGE_MD" | grep -Eo 'https?://[^ )">]+' | head -n 1)

          mkdir -p docs/assets

          if [ -n "$IMAGE_URL" ]; then
            # TODO: handle non-png images
            echo "Downloading image from $IMAGE_URL"
            # Replaced CHANGEME with the issue number
            curl -sL "$IMAGE_URL" -o "docs/assets/issue-${ISSUE_NUM}.png"
          else
            echo "No valid image URL found."
            exit 1
          fi

      - name: Generate Markdown Card
        env:
          TITLE: ${{ steps.issue-parser.outputs.issueparser_name }}
          RESEARCH_FIELD: ${{ steps.issue-parser.outputs.issueparser_research_field }}
          INSTITUTION: ${{ steps.issue-parser.outputs.issueparser_institution }}
          DESC: ${{ steps.issue-parser.outputs.issueparser_description }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          mkdir -p docs/cards
          DATE=$(date +%Y-%m-%d)

          # Replaced CHANGEME with the issue number
          cat <<EOF > "docs/cards/issue-${ISSUE_NUM}.md"
          ---
          title: "$TITLE"
          research_field: "$RESEARCH_FIELD"
          institution: "$INSTITUTION"
          submission_date: "$DATE"
          ---

          # $TITLE

          $DESC

          ![Image](../assets/issue-${ISSUE_NUM}.png)

          ## Details
          - **Co-authors:** ${{ steps.issue-parser.outputs.issueparser_coauthors }}
          - **Keywords:** ${{ steps.issue-parser.outputs.issueparser_keywords }}
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat: add submission card for ${{ steps.issue-parser.outputs.issueparser_name }}"
          title: "Submission: ${{ steps.issue-parser.outputs.issueparser_name }}"
          body: |
            Automated PR to add the submission card for **${{ steps.issue-parser.outputs.issueparser_name }}**.

            Closes #${{ github.event.issue.number }}
          # Used issue number for the branch name
          branch: "submission/issue-${{ github.event.issue.number }}"
          add-paths: |
            docs/cards/*.md
            docs/assets/*
